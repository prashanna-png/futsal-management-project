<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Khyah | Register</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/register.css">
</head>

<body>
<nav class="navbar">
    <div class="nav-left">
        <a href="index.html">HOME</a>
        <a href="Venues.html">VENUES</a>
        <a href="contact.html">CONTACT</a>
    </div>

    <div class="khyah">
        <a href="Home.html" style="all:inherit;text-decoration:none;">Khyah</a>
    </div>

    <div class="nav-right">
        <a href="#">LOGIN</a>
    </div>
</nav>

<div class="auth-container">
    <div class="auth-left">
        <div class="auth-left-content">
            <h1>Play Futsal.<br>Anytime.</h1>
            <p>
                Register to book courts, manage teams,
                track matches, and compete in futsal leagues
                across the city.
            </p>
        </div>
    </div>

    <div class="auth-right">
        <div class="form-box">
            <h2>Create Account</h2>

            <div class="role-toggle">
                <button class="active">Player</button>
                <button>Manager</button>
            </div>

            <form>
                <input type="text" placeholder="Full Name" required>
                <input type="email" placeholder="Email Address" required>

                <select required>
                    <option value="">Preferred Position</option>
                    <option>Goalkeeper</option>
                    <option>Defender</option>
                    <option>Winger</option>
                    <option>Pivot</option>
                </select>

                <input type="tel" placeholder="Phone Number" required>

                <div class="password-field">
                    <input type="password" id="password" placeholder="Password" required>
                    <button type="button" onclick="togglePassword()">Show</button>
                </div>

                <label class="checkbox">
                    <input type="checkbox" required>
                    I agree to the <a href="#">Terms & Privacy</a>
                </label>

                <button class="submit-btn">Create Account</button>

                <div class="login-link">
                    Already registered? <a href="#">Login</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    function togglePassword() {
        const input = document.getElementById("password");
        input.type = input.type === "password" ? "text" : "password";
    }

    document.querySelectorAll(".role-toggle button").forEach(btn => {
        btn.addEventListener("click", () => {
            document.querySelectorAll(".role-toggle button")
                .forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
        });
    });
</script>

</body>
</html>
