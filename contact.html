<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us | Khyah</title>
    <link rel="stylesheet" href="styles/contact.css" />
  </head>

  <body class="bg-black text-white">
    <nav class="navbar">
      <div class="khyah">
        <a
          href="index.html"
          style="
            all: inherit;
            display: inline-block;
            cursor: pointer;
            text-decoration: none;
          "
        >
          Footsal
        </a>
      </div>
      <div class="nav-right nav-font">
        <a href="index.html">HOME</a>
        <a onclick="scrollToContact()">CONTACT US</a>
        <a href="Register.html">REGISTER</a>
        <a href="#">LOGIN</a>
      </div>
    </nav>

    <div class="contact" id="contact">
      <section class="contact-hero">
        <div class="contact-hero-overlay"></div>
        <div class="contact-hero-content">
          <h1 class="contact-hero-title">Contact Khyah</h1>
        </div>
      </section>

      <section class="contact-section">
        <div class="contact-container">
          <div class="contact-form-wrapper">
            <h2 class="contact-form-title">Get in Touch</h2>

            <form class="contact-form">
              <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-input" placeholder="Your name" />
              </div>
              <div class="form-group">
                <label class="form-label">Email Address</label>
                <input
                  type="email"
                  class="form-input"
                  placeholder="you@example.com"
                />
              </div>
              <div class="form-group">
                <label class="form-label">Reason for Contact</label>
                <select class="form-input">
                  <option>General Inquiry</option>
                  <option>Booking Issue</option>
                  <option>Payment Problem</option>
                  <option>Venue Listing</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Message</label>
                <textarea
                  rows="5"
                  class="form-input"
                  placeholder="Describe your issue or inquiry"
                ></textarea>
              </div>
              <button class="form-submit-btn">Send Message</button>
              <p class="form-helper-text">
                We usually respond within 24 hours.
              </p>
            </form>
          </div>
          <div class="contact-info-wrapper">
            <h2 class="contact-info-title">Contact Information</h2>

            <div class="contact-info-list">
              <p><strong>Email:</strong> support@khyah.com</p>
              <p><strong>Phone:</strong> +977-98XXXXXXXX</p>
              <p><strong>Office Hours:</strong> 9 AM – 6 PM (Sun–Fri)</p>
              <p><strong>Location:</strong> Kathmandu, Nepal</p>
            </div>
            <div class="map-placeholder">
               <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2804.3622977427062!2d85.33237612386105!3d27.677897400342818!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x39eb19c18b827885%3A0x4207ecf181978d2e!2sHimalaya%20College%20of%20Engineering!5e0!3m2!1sen!2snp!4v1770041938745!5m2!1sen!2snp" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
          </div>
        </div>
      </section>
    </div>
    
    <footer class="footer">© 2026 Khyah. All rights reserved.</footer>
  </body>
</html>
